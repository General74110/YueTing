name: Yuetingba Podcast RSS

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # 安装依赖（node-fetch + axios）
      - name: 安装依赖
        run: npm install axios node-fetch@2

      # 运行脚本
      - name: 生成 RSS
        run: node index.js

      # Push 到 master
      - name: Push RSS
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add novels
          git commit -m "update podcast rss" || echo "no changes"
          git push origin master